<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wants and Needs — Unit 12 Interactive Teaching Game</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --want:#D4537E;--wantl:#FBEAF0;--wantb:#72243E;
    --need:#1D9E75;--needl:#E1F5EE;--needb:#085041;
    --job:#378ADD;--jobl:#E6F1FB;--jobb:#0C447C;
    --dark:#1a1a2e;--muted:#666;--border:#e0e0e0;
    --gold:#F59E0B;--purple:#7C3AED;
  }
  body{font-family:'Nunito Sans',sans-serif;background:#f0f4ff;padding:16px;min-height:100vh;}
  .wrap{max-width:940px;margin:0 auto;}
  .hdr{text-align:center;margin-bottom:16px;}
  .hdr h1{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;color:var(--dark);}
  .hdr p{font-size:14px;color:var(--muted);margin-top:4px;}
  .sbar{display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
  .sbadge{font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;padding:6px 16px;border-radius:20px;border:none;}
  .sbadge.want{background:var(--wantl);color:var(--wantb);}
  .sbadge.need{background:var(--needl);color:var(--needb);}
  .sbadge.job{background:var(--jobl);color:var(--jobb);}
  .tabs{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;}
  .tab{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:8px 13px;border-radius:20px;border:none;cursor:pointer;background:#eee;color:#555;transition:all .2s;}
  .tab.active{background:var(--dark);color:#fff;transform:scale(1.04);}
  .tab:hover:not(.active){background:#ddd;}
  .panel{background:#fff;border-radius:16px;border:1.5px solid var(--border);padding:20px;min-height:380px;}
  .concept-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
  .concept-card{border-radius:14px;padding:18px;text-align:center;}
  .concept-card.want{background:var(--wantl);border:2px solid var(--want);}
  .concept-card.need{background:var(--needl);border:2px solid var(--need);}
  .concept-card .icon{font-size:44px;margin-bottom:10px;}
  .concept-card .title{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;margin-bottom:8px;}
  .concept-card.want .title{color:var(--wantb);}
  .concept-card.need .title{color:var(--needb);}
  .concept-card .def{font-size:14px;color:var(--dark);line-height:1.6;}
  .eg-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
  .eg-chip{font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;padding:5px 13px;border-radius:20px;}
  .want .eg-chip{background:var(--want);color:#fff;}
  .need .eg-chip{background:var(--need);color:#fff;}
  .voc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;}
  .voc-card{background:#f8f9ff;border-radius:10px;padding:12px 8px;text-align:center;border:1.5px solid #e0e0ff;cursor:pointer;transition:all .2s;}
  .voc-card:hover{background:#E1F5EE;border-color:#1D9E75;}
  .voc-card .vi{font-size:30px;margin-bottom:6px;}
  .voc-card .vw{font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:var(--dark);}
  .voc-card .vd{font-size:12px;color:var(--muted);margin-top:3px;}
  .sort-intro{font-size:14px;color:var(--muted);text-align:center;margin-bottom:12px;}
  .items-pool{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:18px;min-height:50px;padding:12px;background:#f8f9ff;border-radius:12px;border:2px dashed #c0c8ff;}
  .drag-item{font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;padding:9px 16px;border-radius:20px;background:#fff;border:2px solid var(--border);cursor:grab;user-select:none;transition:all .15s;}
  .drag-item:hover{border-color:var(--purple);transform:scale(1.04);}
  .drag-item.dragging{opacity:0.4;}
  .drop-zones{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .drop-zone{border-radius:14px;padding:14px;min-height:130px;}
  .drop-zone.want-zone{background:var(--wantl);border:2px dashed var(--want);}
  .drop-zone.need-zone{background:var(--needl);border:2px dashed var(--need);}
  .dz-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;text-align:center;margin-bottom:10px;}
  .want-zone .dz-title{color:var(--wantb);}
  .need-zone .dz-title{color:var(--needb);}
  .dz-items{display:flex;flex-wrap:wrap;gap:7px;min-height:64px;}
  .placed-want{background:var(--want);color:#fff;border-color:var(--want);}
  .placed-need{background:var(--need);color:#fff;border-color:var(--need);}
  .placed-wrong{background:#E24B4A;color:#fff;border-color:#E24B4A;animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .qa-card{background:#f8f9ff;border-radius:14px;padding:18px;margin-bottom:14px;border-left:4px solid var(--purple);}
  .qa-card .char{font-size:40px;margin-bottom:8px;}
  .qa-card .question{font-size:17px;font-weight:700;color:var(--dark);margin-bottom:14px;line-height:1.5;}
  .qa-opts{display:flex;gap:8px;flex-wrap:wrap;}
  .qa-opt{font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;padding:10px 18px;border-radius:10px;border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;color:var(--dark);}
  .qa-opt:hover{border-color:var(--purple);}
  .qa-opt.correct{background:#1D9E75;color:#fff;border-color:#1D9E75;}
  .qa-opt.wrong{background:#E24B4A;color:#fff;border-color:#E24B4A;}
  .qa-fb{font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;margin-top:12px;min-height:24px;}
  .writing-prompt{background:#E1F5EE;border-radius:14px;padding:16px;margin-bottom:14px;border:2px solid #1D9E75;}
  .writing-prompt .wp-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:var(--needb);margin-bottom:6px;}
  .writing-prompt .wp-hint{font-size:13px;color:var(--muted);margin-bottom:10px;}
  .writing-prompt .starter{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:8px;}
  .writing-area{width:100%;border:2px solid var(--border);border-radius:10px;padding:12px;font-family:'Nunito Sans',sans-serif;font-size:15px;resize:vertical;min-height:90px;outline:none;color:var(--dark);}
  .writing-area:focus{border-color:var(--purple);}
  .sentence-frames{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
  .frame-btn{font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;padding:6px 12px;border-radius:10px;border:1.5px solid var(--need);background:var(--needl);color:var(--needb);cursor:pointer;}
  .frame-btn:hover{background:var(--need);color:#fff;}
  .speak-card{background:#fff;border-radius:14px;border:2px solid var(--job);padding:16px;margin-bottom:12px;}
  .speak-card .sc-label{font-size:12px;font-weight:700;color:var(--jobb);background:var(--jobl);display:inline-block;padding:4px 12px;border-radius:20px;margin-bottom:8px;}
  .speak-card .sc-q{font-size:17px;font-weight:700;color:var(--dark);margin-bottom:8px;line-height:1.5;}
  .speak-card .sc-starter{font-size:14px;color:var(--muted);font-style:italic;}
  .speak-card .example{font-size:14px;color:var(--needb);background:var(--needl);padding:7px 12px;border-radius:8px;margin-top:8px;}
  .jobs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px;}
  .job-card{background:#fff;border-radius:14px;border:2px solid var(--job);padding:16px;text-align:center;cursor:pointer;transition:all .2s;}
  .job-card:hover,.job-card.active{background:var(--jobl);transform:scale(1.03);}
  .job-card .ji{font-size:40px;margin-bottom:8px;}
  .job-card .jn{font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;color:var(--jobb);}
  .job-detail{background:var(--jobl);border-radius:14px;padding:16px;border:2px solid var(--job);margin-top:12px;}
  .job-detail .jd-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;color:var(--jobb);margin-bottom:8px;}
  .job-detail .jd-body{font-size:15px;color:var(--dark);line-height:1.7;}
  .ct-card{background:#fff;border-radius:14px;border:2px solid var(--gold);padding:18px;margin-bottom:12px;}
  .ct-card .ct-badge{font-size:12px;font-weight:700;color:#633806;background:#FAEEDA;display:inline-block;padding:4px 12px;border-radius:20px;margin-bottom:10px;}
  .ct-card .ct-q{font-size:16px;font-weight:700;color:var(--dark);margin-bottom:8px;line-height:1.6;}
  .ct-card .ct-hint{font-size:14px;color:#633806;font-style:italic;}
  .think-btn{font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;padding:8px 18px;border-radius:10px;border:none;background:var(--gold);color:#633806;cursor:pointer;margin-top:10px;}
  .grammar-box{background:#f3f0ff;border-radius:12px;padding:16px;border:2px solid #AFA9EC;margin-bottom:14px;}
  .grammar-box .gb-title{font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;color:#3C3489;margin-bottom:12px;}
  .grammar-ex{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .gex-card{background:#EEEDFE;border-radius:10px;padding:12px;border:1px solid #AFA9EC;}
  .gex-card .gq{font-size:14px;font-weight:700;color:#26215C;margin-bottom:5px;}
  .gex-card .ga{font-size:14px;color:#3C3489;}
  .grammar-fill{margin-top:12px;}
  .gf-item{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .gf-item span{font-size:15px;color:var(--dark);}
  .gf-input{font-family:'Nunito Sans',sans-serif;font-size:15px;font-weight:700;border:2px solid #AFA9EC;border-radius:8px;padding:6px 12px;outline:none;width:140px;text-align:center;color:var(--dark);}
  .gf-input:focus{border-color:#7C3AED;}
  .gf-input.correct{border-color:#1D9E75;background:#E1F5EE;}
  .gf-input.wrong{border-color:#E24B4A;background:#FCEBEB;}
  .btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;padding:10px 22px;border-radius:10px;border:none;cursor:pointer;transition:all .15s;}
  .btn:active{transform:scale(0.96);}
  .btn:hover{filter:brightness(1.08);}
  .btn-dark{background:var(--dark);color:#fff;}
  .btn-want{background:var(--want);color:#fff;}
  .btn-need{background:var(--need);color:#fff;}
  .btn-job{background:var(--job);color:#fff;}
  .fb-ok{color:#1D9E75;font-weight:700;font-size:14px;}
  .fb-no{color:#E24B4A;font-weight:700;font-size:14px;}
  .section-title{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:var(--dark);margin:16px 0 10px;}
  .round-announce{text-align:center;padding:36px 20px;}
  .round-announce .big{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;color:var(--dark);margin-bottom:10px;}
  .round-announce .sub{font-size:16px;color:var(--muted);margin-bottom:18px;}
  @media(max-width:600px){
    .concept-grid,.drop-zones,.jobs-grid,.grammar-ex,.voc-grid{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>Wants and Needs — Unit 12</h1>
    <p>Interactive Teaching Game · Vocabulary · Speaking · Writing · Critical Thinking · Grammar</p>
  </div>

  <div class="sbar">
    <span class="sbadge want" id="wScore">Wants sorted: 0</span>
    <span class="sbadge need" id="nScore">Needs sorted: 0</span>
    <span class="sbadge job" id="qScore">Quiz points: 0</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="go('intro')">📚 Learn</button>
    <button class="tab" onclick="go('vocab')">🔤 Vocab</button>
    <button class="tab" onclick="go('sort')">🎯 Sort It!</button>
    <button class="tab" onclick="go('quiz')">❓ Quiz</button>
    <button class="tab" onclick="go('jobs')">👷 Jobs</button>
    <button class="tab" onclick="go('grammar')">✏️ Grammar</button>
    <button class="tab" onclick="go('writing')">📝 Writing</button>
    <button class="tab" onclick="go('speak')">🗣️ Speaking</button>
    <button class="tab" onclick="go('think')">🧠 Think!</button>
  </div>

  <div class="panel" id="panel"></div>
</div>

<script>
let wScore=0,nScore=0,qScore=0,qIdx=0,dragItem=null,dragOrigin=null;

const vocabs=[
  {w:'job',e:'👔',d:'Work people do for money'},
  {w:'doctor',e:'👩‍⚕️',d:'Helps keep us healthy'},
  {w:'police officer',e:'👮',d:'Helps keep us safe'},
  {w:'teacher',e:'👩‍🏫',d:'Helps us learn'},
  {w:'help',e:'🤝',d:'To do something for others'},
  {w:'money',e:'💰',d:'Used to buy things'},
  {w:'clothes',e:'👕',d:'Things we wear'},
  {w:'water',e:'💧',d:'Liquid we drink to live'},
  {w:'food',e:'🍎',d:'Things we eat to grow'},
  {w:'home',e:'🏠',d:'A place to live in'},
  {w:'want',e:'💛',d:'Something we would like'},
  {w:'need',e:'💚',d:'Something we must have'},
];

const sortItems=[
  {label:'kitten 🐱',cat:'want'},{label:'bicycle 🚲',cat:'want'},
  {label:'games 🎮',cat:'want'},{label:'stickers ⭐',cat:'want'},
  {label:'water 💧',cat:'need'},{label:'food 🍎',cat:'need'},
  {label:'clothes 👕',cat:'need'},{label:'home 🏠',cat:'need'},
  {label:'money 💰',cat:'need'},{label:'pencil ✏️',cat:'need'},
  {label:'sneakers 👟',cat:'need'},{label:'doll 🪆',cat:'want'},
];

const quizQs=[
  {char:'🐱',q:'Maria wants a kitten. Is a kitten a want or a need?',opts:['Want','Need','Both'],ans:'Want',fb:'Great! A kitten is a want — something nice to have but not needed to live.'},
  {char:'✏️',q:'Ji-Min needs a pencil to do her homework. Is a pencil a want or a need?',opts:['Want','Need'],ans:'Need',fb:'Yes! Ji-Min NEEDS a pencil for school. It helps her learn.'},
  {char:'👟',q:'Sam needs new sneakers to walk to school. Are sneakers a want or a need?',opts:['Want','Need','Both'],ans:'Need',fb:'Correct! Sneakers are clothes — we need clothes to live!'},
  {char:'🚲',q:'Akif wants a new bicycle. Is a bicycle a want or a need?',opts:['Want','Need'],ans:'Want',fb:'Right! A bicycle is a want — fun, but not needed to live.'},
  {char:'💧',q:'We need food and _____ to grow and keep healthy.',opts:['money','water','clothes','jobs'],ans:'water',fb:'Yes! Food and water are basic needs for our body.'},
  {char:'💰',q:'A farmer grows food. People buy food with _____.',opts:['water','money','help','clothes'],ans:'money',fb:'Correct! We use money to buy things we want and need.'},
  {char:'👮',q:'Police officers have a _____ job — they help keep us safe.',opts:['service','farm','store','school'],ans:'service',fb:'Great! Police officers, doctors, and teachers all have SERVICE jobs.'},
  {char:'👩‍⚕️',q:'Doctors help keep us _____.',opts:['healthy','rich','hungry','warm'],ans:'healthy',fb:'Correct! Doctors help keep us HEALTHY. Police keep us SAFE.'},
];

const jobs=[
  {icon:'👩‍⚕️',name:'Doctor',service:'Yes',help:'Keeps us healthy',need:'health / medicine',ex:'The doctor checks if you are sick.'},
  {icon:'👮',name:'Police Officer',service:'Yes',help:'Keeps us safe',need:'safety',ex:'The police officer helps people stay safe.'},
  {icon:'👩‍🏫',name:'Teacher',service:'Yes',help:'Helps us learn',need:'education',ex:'The teacher helps us learn to read.'},
  {icon:'🚛',name:'Truck Driver',service:'No',help:'Takes food to stores',need:'food / transport',ex:'The truck driver takes food to the supermarket.'},
  {icon:'🌾',name:'Farmer',service:'No',help:'Grows food for us',need:'food',ex:'The farmer grows vegetables to sell.'},
  {icon:'🏪',name:'Store Worker',service:'Yes',help:'Helps us get things',need:'clothes / food',ex:'The woman in the store helps me find clothes.'},
];

const ctQs=[
  {level:'Think',q:'Why do all people need food and water, but NOT all people want the same things?',hint:'What happens if you don\'t have food? What happens if you don\'t have a toy?'},
  {level:'Connect',q:'Sana wants games. Tarik wants games too. Are games always a want? Could they ever be a need?',hint:'Think about a child who needs a computer for school...'},
  {level:'Evaluate',q:'If you could only keep 3 things — kitten, water, clothes, bicycle, food, home — which 3 would you keep and why?',hint:'Use: "I would keep ___ because ___."'},
  {level:'Create',q:'Can you think of a NEW service job not in the book? What need does it help with?',hint:'Think about people who help in your school or neighborhood.'},
  {level:'Real Life',q:'A farmer grows food → truck driver takes it → you buy it. Who needs who? Why is each job important?',hint:'Try: "Without the farmer, we would not have..."'},
  {level:'Compare',q:'Maria wants a kitten. Ji-Min needs a pencil. How are these situations DIFFERENT?',hint:'Find the key words: "want" and "need" in each sentence.'},
];

const writingPrompts=[
  {title:'My Wants and Needs',hint:'Write 3–4 sentences about things you want and things you need.',starter:'I want ___. I also want ___. I need ___ because ___.'},
  {title:'Tell me about a service job',hint:'Choose a job. Write 3 sentences about it.',starter:'A ___ has a service job. They help people by ___. We need them because ___.'},
  {title:'Does she / he want or need it?',hint:'Pick a character from the book. Write about what they want or need.',starter:'___ wants ___. Does she/he need it? No, she/he does not. She/he wants it because ___.'},
];

const frames=["I want ___ because ___.", "I need ___ because ___.", "___ has a service job.", "They help people by ___.", "Does she have ___? No, she doesn't.", "He wants a ___.","She needs a ___."];

const speakCards=[
  {label:'Ask & Answer',q:'What does Maria want?',starter:'She wants a ___.', ex:'She wants a kitten.'},
  {label:'Ask & Answer',q:'What does Akif want?',starter:'He wants a ___.', ex:'He wants a new bicycle.'},
  {label:'Yes/No Question',q:'Does Maria have a kitten?',starter:'No, she ___.', ex:'No, she doesn\'t.'},
  {label:'Yes/No Question',q:'Does he drive our school bus?',starter:'Yes, he ___.', ex:'Yes, he does. He drives us.'},
  {label:'Partner Game',q:'Choose Sana, Tarik, Sofia, Tom, Megan, or Lucas. Your partner asks questions to guess who it is!',starter:'Does she want ___? Does he have ___?',ex:'Is it Megan? Yes, it is!'},
  {label:'Talk About You',q:'Tell your partner: What do YOU want? What do YOU need?',starter:'I want ___. I need ___ because ___.', ex:'I want a game. I need water because my body needs it to grow.'},
  {label:'Service Jobs',q:'Think of a service job. Tell your partner what that person does.',starter:'A ___ helps people by ___. We need them because ___.', ex:'A doctor helps people by keeping them healthy.'},
];

const grammarItems=[
  {q:'Does Maria have a kitten?',a:"doesn't",blank:"No, she ___."},
  {q:'What does Akif want?',a:'wants',blank:'He ___ a bicycle.'},
  {q:'Does he drive our school bus?',a:'does',blank:'Yes, he ___.'},
  {q:'What does she want today?',a:'wants',blank:'She ___ stickers.'},
];

function updateScores(){
  document.getElementById('wScore').textContent='Wants sorted: '+wScore;
  document.getElementById('nScore').textContent='Needs sorted: '+nScore;
  document.getElementById('qScore').textContent='Quiz points: '+qScore;
}

function go(mode){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const modes=['intro','vocab','sort','quiz','jobs','grammar','writing','speak','think'];
    t.classList.toggle('active',modes[i]===mode);
  });
  const p=document.getElementById('panel');
  if(mode==='intro') renderIntro(p);
  else if(mode==='vocab') renderVocab(p);
  else if(mode==='sort') renderSort(p);
  else if(mode==='quiz') renderQuiz(p);
  else if(mode==='jobs') renderJobs(p);
  else if(mode==='grammar') renderGrammar(p);
  else if(mode==='writing') renderWriting(p);
  else if(mode==='speak') renderSpeak(p);
  else if(mode==='think') renderThink(p);
}

function renderIntro(p){
  p.innerHTML=`
    <div class="concept-grid">
      <div class="concept-card want">
        <div class="icon">💛</div>
        <div class="title">WANT</div>
        <div class="def">Things we would <strong>like</strong> to have but do not need to live.</div>
        <div class="eg-row"><span class="eg-chip">kitten</span><span class="eg-chip">bicycle</span><span class="eg-chip">games</span><span class="eg-chip">stickers</span></div>
      </div>
      <div class="concept-card need">
        <div class="icon">💚</div>
        <div class="title">NEED</div>
        <div class="def">Things we <strong>must have</strong> to live, grow, and stay healthy.</div>
        <div class="eg-row"><span class="eg-chip">food</span><span class="eg-chip">water</span><span class="eg-chip">home</span><span class="eg-chip">clothes</span></div>
      </div>
    </div>
    <div style="background:#f8f9ff;border-radius:12px;padding:16px;margin-bottom:14px;border-left:4px solid #378ADD;">
      <div style="font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;color:#0C447C;margin-bottom:6px;">Key idea from the book:</div>
      <div style="font-size:15px;color:#1a1a2e;line-height:1.7;">Needs are things we <em>must</em> have to live. We need a home, food, water, and clothes. Wants are things we would <em>like</em> to have. People want different things! We need money to buy the things we want and need. People have <strong>jobs</strong> to get money.</div>
    </div>
    <div style="background:#FBEAF0;border-radius:12px;padding:16px;border-left:4px solid #D4537E;">
      <div style="font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;color:#72243E;margin-bottom:8px;">Teacher discussion starters:</div>
      <div style="font-size:14px;color:#4B1528;line-height:1.8;">
        1. "What did you eat for breakfast? Is that a want or a need?"<br>
        2. "If you saw a puppy in a shop, would you WANT it? Could you live without it?"<br>
        3. "What would happen if you had no food for 2 days? What about no toys?"<br>
        4. "Who helps you at school? What do they do for you?"
      </div>
    </div>
    <div style="text-align:center;margin-top:16px"><button class="btn btn-dark" onclick="go('vocab')">Next: Learn the Words →</button></div>`;
}

function renderVocab(p){
  p.innerHTML=`
    <div style="font-size:14px;font-weight:700;color:var(--muted);text-align:center;margin-bottom:12px;">All 12 key words from Unit 12 — tap any card!</div>
    <div class="voc-grid">
      ${vocabs.map(v=>`
        <div class="voc-card" onclick="this.style.background='#E1F5EE';this.style.borderColor='#1D9E75';setTimeout(()=>{this.style.background='#f8f9ff';this.style.borderColor='#e0e0ff';},900)">
          <div class="vi">${v.e}</div>
          <div class="vw">${v.w}</div>
          <div class="vd">${v.d}</div>
        </div>`).join('')}
    </div>
    <div style="text-align:center;margin-top:16px"><button class="btn btn-dark" onclick="go('sort')">Next: Sort It! →</button></div>`;
}

function renderSort(p){
  const shuffled=[...sortItems].sort(()=>Math.random()-.5);
  let placed={want:[],need:[]};
  p.innerHTML=`
    <div class="sort-intro">Drag each item into the correct box — WANT or NEED?</div>
    <div class="items-pool" id="pool">
      ${shuffled.map(i=>`<div class="drag-item" draggable="true" data-cat="${i.cat}" data-label="${i.label}" id="di_${i.label.replace(/[\s🐱🚲🎮⭐💧🍎👕🏠💰✏️👟🪆]/g,'_')}">${i.label}</div>`).join('')}
    </div>
    <div class="drop-zones">
      <div class="drop-zone want-zone" id="dz_want"><div class="dz-title">💛 WANT</div><div class="dz-items" id="di_want"></div></div>
      <div class="drop-zone need-zone" id="dz_need"><div class="dz-title">💚 NEED</div><div class="dz-items" id="di_need"></div></div>
    </div>
    <div style="text-align:center;margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn" style="background:#eee;color:#333" onclick="renderSort(document.getElementById('panel'))">Reset</button>
      <button class="btn btn-need" onclick="go('quiz')">Next: Quiz →</button>
    </div>
    <div id="sortFb" style="margin-top:12px;text-align:center;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;"></div>`;
  setupDrag(placed);
}

function setupDrag(placed){
  document.querySelectorAll('.drag-item').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragItem=el;dragOrigin=el.parentElement.id;el.classList.add('dragging');});
    el.addEventListener('dragend',e=>{el.classList.remove('dragging');dragItem=null;});
  });
  ['dz_want','dz_need'].forEach(zid=>{
    const zone=document.getElementById(zid);
    zone.addEventListener('dragover',e=>e.preventDefault());
    zone.addEventListener('drop',e=>{
      e.preventDefault();
      if(!dragItem) return;
      const cat=dragItem.dataset.cat;
      const label=dragItem.dataset.label;
      const zoneCat=zid==='dz_want'?'want':'need';
      if(dragOrigin==='di_want') placed.want=placed.want.filter(x=>x!==label);
      if(dragOrigin==='di_need') placed.need=placed.need.filter(x=>x!==label);
      const itemsDiv=document.getElementById('di_'+zoneCat);
      dragItem.classList.remove('placed-want','placed-need','placed-wrong');
      if(cat===zoneCat){
        dragItem.classList.add(zoneCat==='want'?'placed-want':'placed-need');
        placed[zoneCat].push(label);
        if(zoneCat==='want'){wScore++;} else {nScore++;}
        updateScores();
      } else {
        dragItem.classList.add('placed-wrong');
        placed[zoneCat].push(label);
      }
      itemsDiv.appendChild(dragItem);
      dragOrigin=zid;
    });
  });
}

function renderQuiz(p){qIdx=0;showQ(p);}
function showQ(p){
  if(qIdx>=quizQs.length){
    p.innerHTML=`<div class="round-announce"><div class="big">Quiz Done! 🎉</div><div class="sub">You scored ${qScore} quiz points!</div><button class="btn btn-dark" onclick="qIdx=0;renderQuiz(document.getElementById('panel'))">Try Again</button><div style="margin-top:12px"><button class="btn btn-job" onclick="go('jobs')">Next: Jobs →</button></div></div>`;return;
  }
  const q=quizQs[qIdx];
  p.innerHTML=`
    <div style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:12px;">Question ${qIdx+1} of ${quizQs.length}</div>
    <div class="qa-card">
      <div class="char">${q.char}</div>
      <div class="question">${q.q}</div>
      <div class="qa-opts">${q.opts.map(o=>`<button class="qa-opt" onclick="checkQ('${o}','${q.ans}',this,'${q.fb.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>
      <div class="qa-fb" id="qfb"></div>
    </div>`;
}
function checkQ(chosen,ans,btn,fb){
  document.querySelectorAll('.qa-opt').forEach(b=>b.style.pointerEvents='none');
  const fbEl=document.getElementById('qfb');
  if(chosen===ans){btn.classList.add('correct');fbEl.innerHTML=`<span class="fb-ok">✅ ${fb}</span>`;qScore++;updateScores();}
  else{btn.classList.add('wrong');document.querySelectorAll('.qa-opt').forEach(b=>{if(b.textContent===ans)b.classList.add('correct');});fbEl.innerHTML=`<span class="fb-no">❌ ${fb}</span>`;}
  setTimeout(()=>{qIdx++;showQ(document.getElementById('panel'));},1900);
}

function renderJobs(p){
  p.innerHTML=`
    <div style="font-size:14px;color:var(--muted);text-align:center;margin-bottom:12px;">Tap a job to learn more!</div>
    <div class="jobs-grid">
      ${jobs.map((j,i)=>`<div class="job-card" id="jc${i}" onclick="selectJob(${i})"><div class="ji">${j.icon}</div><div class="jn">${j.name}</div></div>`).join('')}
    </div>
    <div id="jobDetail"></div>
    <div style="margin-top:16px;background:#f8f9ff;border-radius:12px;padding:14px;border-left:4px solid var(--job);">
      <div style="font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;color:#0C447C;margin-bottom:8px;">Teacher: Ask the class —</div>
      <div style="font-size:14px;color:var(--dark);line-height:1.8;">"Which are SERVICE jobs?" (Doctor, Police, Teacher, Store Worker)<br>"Who helps people get food?" (Farmer, Truck Driver, Store Worker)<br>"What would happen if we had no teachers?"</div>
    </div>`;
  window.selectJob=function(i){
    document.querySelectorAll('.job-card').forEach(c=>c.classList.remove('active'));
    document.getElementById('jc'+i).classList.add('active');
    const j=jobs[i];
    document.getElementById('jobDetail').innerHTML=`<div class="job-detail"><div class="jd-title">${j.icon} ${j.name}</div><div class="jd-body"><strong>Service job?</strong> ${j.service==='Yes'?'Yes! This is a service job.':'Not a service job, but very important!'}<br><strong>How they help:</strong> ${j.help}<br><strong>Need they meet:</strong> ${j.need}<br><em>${j.ex}</em></div></div>`;
  };
}

function renderGrammar(p){
  p.innerHTML=`
    <div class="grammar-box">
      <div class="gb-title">Simple Present Questions — Does / Do / Want / Have</div>
      <div class="grammar-ex">
        <div class="gex-card"><div class="gq">Does Maria have a kitten?</div><div class="ga">No, she doesn't.</div></div>
        <div class="gex-card"><div class="gq">What does Akif want?</div><div class="ga">He wants a bicycle.</div></div>
        <div class="gex-card"><div class="gq">Does he drive our school bus?</div><div class="ga">Yes, he does. He drives us.</div></div>
        <div class="gex-card"><div class="gq">What does she want today?</div><div class="ga">She wants stickers.</div></div>
      </div>
    </div>
    <div class="section-title">Fill in the blank:</div>
    <div class="grammar-fill">
      ${grammarItems.map((g,i)=>`
        <div class="gf-item">
          <span style="font-size:13px;color:var(--muted)">${i+1}.</span>
          <span>${g.q} →</span>
          <span>${g.blank.replace('___',`<input class="gf-input" id="gf${i}" placeholder="..." onkeydown="if(event.key==='Enter')checkGrammar(${i},'${g.a}')">`)}</span>
          <button class="btn" style="background:#EEEDFE;color:#3C3489;font-size:12px;padding:6px 14px" onclick="checkGrammar(${i},'${g.a}')">✓</button>
          <span id="gfb${i}"></span>
        </div>`).join('')}
    </div>
    <div style="text-align:center;margin-top:16px"><button class="btn btn-dark" onclick="renderGrammar(document.getElementById('panel'))">Reset</button></div>`;
}
function checkGrammar(i,ans){
  const inp=document.getElementById('gf'+i);
  const fb=document.getElementById('gfb'+i);
  if(inp.value.trim().toLowerCase()===ans.toLowerCase()){inp.classList.add('correct');inp.classList.remove('wrong');fb.innerHTML='<span class="fb-ok">✅</span>';}
  else{inp.classList.add('wrong');inp.classList.remove('correct');fb.innerHTML=`<span class="fb-no">❌ "${ans}"</span>`;}
}

function renderWriting(p){
  let wpIdx=0;
  function showWP(){
    const wp=writingPrompts[wpIdx];
    p.innerHTML=`
      <div style="text-align:center;margin-bottom:12px;">${writingPrompts.map((_,i)=>`<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${i===wpIdx?'#1D9E75':'#ccc'};margin:0 4px;"></span>`).join('')}</div>
      <div class="writing-prompt"><div class="wp-title">✍️ ${wp.title}</div><div class="wp-hint">${wp.hint}</div><div class="starter"><strong>Starter:</strong> ${wp.starter}</div></div>
      <div class="section-title">Sentence frames (tap to insert):</div>
      <div class="sentence-frames">${frames.map(f=>`<button class="frame-btn" onclick="insertFrame('${f.replace(/'/g,"\\'")}')">${f}</button>`).join('')}</div>
      <textarea class="writing-area" id="writingBox" placeholder="Write your sentences here..."></textarea>
      <div style="text-align:center;margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        ${wpIdx>0?`<button class="btn" style="background:#eee;color:#555" onclick="wpIdx--;showWP()">← Back</button>`:''}
        <button class="btn btn-dark" onclick="saveW()">Save ✓</button>
        ${wpIdx<writingPrompts.length-1?`<button class="btn btn-need" onclick="wpIdx++;showWP()">Next →</button>`:''}
      </div>
      <div id="writeFb" style="text-align:center;margin-top:10px;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;color:#1D9E75;"></div>`;
  }
  window.insertFrame=function(f){const t=document.getElementById('writingBox');t.value+=(t.value?' ':'')+f;t.focus();};
  window.saveW=function(){const v=document.getElementById('writingBox').value.trim();document.getElementById('writeFb').innerHTML=v.length>5?'Great writing! ✅ Well done!':'<span style="color:#E24B4A">Please write something first!</span>';};
  window.wpIdx=0;window.showWP=showWP;showWP();
}

function renderSpeak(p){
  p.innerHTML=`<div style="font-size:14px;color:var(--muted);text-align:center;margin-bottom:14px;">Speaking activities — practice with a partner or with the class!</div>
    ${speakCards.map(s=>`<div class="speak-card"><div class="sc-label">${s.label}</div><div class="sc-q">${s.q}</div><div class="sc-starter">Starter: ${s.starter}</div><div class="example">Example: "${s.ex}"</div></div>`).join('')}`;
}

function renderThink(p){
  p.innerHTML=`<div style="font-size:14px;color:var(--muted);text-align:center;margin-bottom:14px;">Critical thinking — discuss as a class!</div>
    ${ctQs.map((c,i)=>`<div class="ct-card"><div class="ct-badge">🧠 ${c.level}</div><div class="ct-q">${i+1}. ${c.q}</div><div class="ct-hint" id="ctH${i}" style="display:none;margin-top:10px;background:#FAEEDA;padding:10px 14px;border-radius:8px;">${c.hint}</div><button class="think-btn" onclick="toggleH(${i})">💡 Show Hint</button></div>`).join('')}`;
  window.toggleH=function(i){const e=document.getElementById('ctH'+i);e.style.display=e.style.display==='none'?'block':'none';};
}

go('intro');
</script>
